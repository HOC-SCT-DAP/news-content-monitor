name: Parliamentary News Monitor

on:
  repository_dispatch:
    types: [cron_trigger]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    # Give the action permission to write back to the repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install py-readability-metrics beautifulsoup4 pandas matplotlib nltk requests
          # Ensure NLTK data is available for the monitor script
          python -m nltk.downloader punkt

      - name: Run News Content Monitor
        run: python news_content_monitor.py

      - name: Run Plot Graph
        run: python plot_graph.py

      - name: Run Site Generator
        run: python site_generator.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/*
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: $(date)" && git push)
